server:
  port: 8080

spring:
  application:
    name: light-backend
  datasource:
    url: jdbc:h2:mem:ligthdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
      encoding: UTF-8

app:
  jwt:
    secret: TGlnaHRTZWNyZXRLZXlGb3JKV1RUb2tlbkdlbmVyYXRpb24yMDI0UHJvZHVjdGlvblJlYWR5
    expiration-ms: 900000
    refresh-expiration-ms: 86400000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
