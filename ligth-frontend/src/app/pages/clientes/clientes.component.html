<div class="page-wrapper">
  <mat-toolbar class="app-header">
    <div class="header-content">
      <div class="brand"><mat-icon class="brand-icon">lightbulb</mat-icon><span class="brand-name">LIGTH</span></div>
      <div class="nav-links">
        <button mat-button (click)="navegarConsulta()"><mat-icon>search</mat-icon> Consulta</button>
        <button mat-button disabled><mat-icon>people</mat-icon> Clientes</button>
        <button mat-button (click)="navegarProdutos()"><mat-icon>inventory_2</mat-icon> Produtos</button>
        <button mat-button (click)="navegarPedidos()"><mat-icon>receipt_long</mat-icon> Pedidos</button>
        <button mat-button (click)="navegarEstoque()"><mat-icon>warehouse</mat-icon> Estoque</button>
      </div>
      <button mat-icon-button [matMenuTriggerFor]="userMenu"><mat-icon>account_circle</mat-icon></button>
      <mat-menu #userMenu="matMenu"><button mat-menu-item (click)="logout()"><mat-icon>logout</mat-icon><span>Sair</span></button></mat-menu>
    </div>
  </mat-toolbar>
  <main class="main-content"><div class="container">
    <mat-card class="crud-card">
      <div class="card-header">
        <div><h2>Clientes</h2><p>Gerencie os clientes cadastrados</p></div>
        <button mat-raised-button color="primary" (click)="novo()" *ngIf="!mostrarForm"><mat-icon>add</mat-icon> Novo</button>
      </div>
      @if (mostrarForm) {
        <div class="form-container">
          <h3>{{ editandoId ? 'Editar' : 'Novo' }} Cliente</h3>
          <form [formGroup]="form" (ngSubmit)="salvar()">
            <div class="form-row">
              <mat-form-field appearance="outline"><mat-label>Nome *</mat-label><input matInput formControlName="nome"></mat-form-field>
              <mat-form-field appearance="outline"><mat-label>CPF/CNPJ</mat-label><input matInput formControlName="cpfCnpj"></mat-form-field>
            </div>
            <div class="form-row">
              <mat-form-field appearance="outline"><mat-label>Telefone</mat-label><input matInput formControlName="telefone"></mat-form-field>
              <mat-form-field appearance="outline"><mat-label>Email</mat-label><input matInput formControlName="email"></mat-form-field>
            </div>
            <mat-form-field appearance="outline"><mat-label>Endereco</mat-label><input matInput formControlName="endereco"></mat-form-field>
            <div class="form-actions">
              <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid"><mat-icon>save</mat-icon> Salvar</button>
              <button mat-stroked-button type="button" (click)="cancelar()">Cancelar</button>
            </div>
          </form>
        </div>
      }
      <div class="table-wrapper">
        <table mat-table [dataSource]="clientes">
          <ng-container matColumnDef="nome"><th mat-header-cell *matHeaderCellDef>Nome</th><td mat-cell *matCellDef="let r">{{r.nome}}</td></ng-container>
          <ng-container matColumnDef="cpfCnpj"><th mat-header-cell *matHeaderCellDef>CPF/CNPJ</th><td mat-cell *matCellDef="let r">{{r.cpfCnpj}}</td></ng-container>
          <ng-container matColumnDef="telefone"><th mat-header-cell *matHeaderCellDef>Telefone</th><td mat-cell *matCellDef="let r">{{r.telefone}}</td></ng-container>
          <ng-container matColumnDef="email"><th mat-header-cell *matHeaderCellDef>Email</th><td mat-cell *matCellDef="let r">{{r.email}}</td></ng-container>
          <ng-container matColumnDef="dataCadastro"><th mat-header-cell *matHeaderCellDef>Cadastro</th><td mat-cell *matCellDef="let r">{{r.dataCadastro | date:'dd/MM/yyyy'}}</td></ng-container>
          <ng-container matColumnDef="acoes"><th mat-header-cell *matHeaderCellDef></th><td mat-cell *matCellDef="let r">
            <button mat-icon-button color="primary" (click)="editar(r)"><mat-icon>edit</mat-icon></button>
            <button mat-icon-button color="warn" (click)="excluir(r)"><mat-icon>delete</mat-icon></button>
          </td></ng-container>
          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let r; columns: displayedColumns;"></tr>
        </table>
      </div>
    </mat-card>
  </div></main>
</div>
